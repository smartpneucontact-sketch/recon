<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <meta name="theme-color" content="#0a2240" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Recon" />
  <meta name="format-detection" content="telephone=no" />
  <title>Atlantic Subaru — Recon</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand">
      <span class="brand-mark">★</span>
      <span class="brand-name"><span class="brand-full">Atlantic Subaru · </span>Recon</span>
    </div>
    <div class="topbar-clock" id="topbar-clock" aria-live="off">
      <span class="topbar-clock-date" id="topbar-clock-date"></span>
      <span class="topbar-clock-time" id="topbar-clock-time"></span>
      <span class="topbar-clock-tz">ET</span>
    </div>
    <div class="topbar-right">
      <span id="user-chip" class="user-chip" hidden>
        <span class="user-name" id="user-name"></span>
        <span class="user-role-wrap">
          <span id="live-dot" class="live-dot" title="Live updates"></span>
          <span class="user-role" id="user-role"></span>
        </span>
      </span>
      <button id="users-btn" class="ghost-on-dark role-gated" data-roles="manager" hidden aria-label="Users" title="Users">👥</button>
      <select id="lang-select" aria-label="Language">
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
      <button id="logout-btn" class="ghost-on-dark" hidden aria-label="Sign out" title="Sign out">⎋</button>
    </div>
  </header>

  <div id="urgent-toast" class="urgent-toast" hidden role="status" aria-live="polite">
    <span class="urgent-bolt" aria-hidden="true">🚨</span>
    <div class="urgent-toast-body">
      <strong id="urgent-toast-title"></strong>
      <span id="urgent-toast-sub"></span>
    </div>
    <button id="urgent-toast-close" class="urgent-toast-close" aria-label="Dismiss">✕</button>
  </div>

  <div id="enable-push-banner" class="push-banner" hidden>
    <span>🔔 <span data-i18n="push.enable">Get notified when a job is marked urgent.</span></span>
    <span class="push-banner-actions">
      <button id="enable-push-btn" class="primary" data-i18n="push.enableBtn">Enable</button>
      <button id="dismiss-push-btn" class="ghost" data-i18n="push.notNow">Not now</button>
    </span>
  </div>

  <main id="app"></main>

  <template id="tpl-login">
    <section class="card login">
      <h1 data-i18n="login.title">Sign in</h1>
      <p class="muted" data-i18n="login.hint">Sign in with your email and password.</p>
      <form id="login-form">
        <label>
          <span data-i18n="auth.email">Email</span>
          <input type="email" id="login-email" autocomplete="email" inputmode="email" enterkeyhint="next" required />
        </label>
        <label>
          <span data-i18n="auth.password">Password</span>
          <input type="password" id="login-password" autocomplete="current-password" enterkeyhint="go" required />
        </label>
        <button type="submit" class="primary block big" data-i18n="login.submit">Sign in</button>
        <p id="login-error" class="error" hidden></p>
      </form>
      <p class="muted center auth-switch">
        <span data-i18n="login.noAccount">No account?</span>
        <a href="#" id="go-signup" data-i18n="login.signupLink">Create one</a>
      </p>
    </section>
  </template>

  <template id="tpl-signup">
    <section class="card login">
      <h1 data-i18n="signup.title">Create account</h1>
      <p class="muted" data-i18n="signup.hint">Pick the role that matches your job.</p>
      <form id="signup-form">
        <label>
          <span data-i18n="auth.name">Name</span>
          <input type="text" id="signup-name" autocomplete="name" enterkeyhint="next" required />
        </label>
        <label>
          <span data-i18n="auth.email">Email</span>
          <input type="email" id="signup-email" autocomplete="email" inputmode="email" enterkeyhint="next" required />
        </label>
        <label>
          <span data-i18n="auth.phone">Phone number</span>
          <input type="tel" id="signup-phone" autocomplete="tel" inputmode="tel" enterkeyhint="next" required />
        </label>
        <label>
          <span data-i18n="auth.password">Password</span>
          <input type="password" id="signup-password" autocomplete="new-password" minlength="6" enterkeyhint="next" required />
          <small class="muted" data-i18n="signup.passwordHint">At least 6 characters.</small>
        </label>
        <fieldset class="cat-picker">
          <legend data-i18n="auth.role">Role</legend>
          <label class="cat-card">
            <input type="radio" name="signup-role" value="manager" required />
            <span class="cat-tile">
              <span class="cat-icon">👔</span>
              <span class="cat-label" data-i18n="role.manager">Manager</span>
            </span>
          </label>
          <label class="cat-card">
            <input type="radio" name="signup-role" value="sales" />
            <span class="cat-tile">
              <span class="cat-icon">🤝</span>
              <span class="cat-label" data-i18n="role.sales">Sales</span>
            </span>
          </label>
          <label class="cat-card">
            <input type="radio" name="signup-role" value="service_advisor" />
            <span class="cat-tile">
              <span class="cat-icon">🛠️</span>
              <span class="cat-label" data-i18n="role.service_advisor">Service Advisor</span>
            </span>
          </label>
          <label class="cat-card">
            <input type="radio" name="signup-role" value="recon" />
            <span class="cat-tile">
              <span class="cat-icon">🧽</span>
              <span class="cat-label" data-i18n="role.recon">Recon</span>
            </span>
          </label>
        </fieldset>
        <button type="submit" class="primary block big" data-i18n="signup.submit">Create account</button>
        <p id="signup-error" class="error" hidden></p>
      </form>
      <p class="muted center auth-switch">
        <span data-i18n="signup.haveAccount">Already have an account?</span>
        <a href="#" id="go-login" data-i18n="signup.loginLink">Sign in</a>
      </p>
    </section>
  </template>

  <template id="tpl-dashboard">
    <section class="dashboard">
      <div class="filters">
        <div class="seg" role="tablist" id="status-filter">
          <button data-status="pending" class="active" data-i18n="filter.pending">Pending</button>
          <button data-status="completed" data-i18n="filter.completed">Completed</button>
          <button data-status="all" data-i18n="filter.all">All</button>
        </div>
      </div>

      <div id="manager-actions" class="role-gated" data-roles="manager,sales,service_advisor" hidden>
        <button id="add-car-btn" class="primary block">
          <span>+ </span><span data-i18n="dashboard.addCar">Add vehicle</span>
        </button>
      </div>

      <div class="boards">
        <section class="board board-next" data-lane="120">
          <header class="board-header">
            <span class="board-title next">
              <span class="board-icon">🚿</span>
              <span>120</span>
            </span>
            <span class="board-count" data-board-count></span>
          </header>
          <div class="board-list" data-board-list></div>
          <p class="board-empty muted center" data-board-empty hidden data-i18n="dashboard.empty">No vehicles.</p>
        </section>
        <section class="board board-next" data-lane="124">
          <header class="board-header">
            <span class="board-title next">
              <span class="board-icon">🚿</span>
              <span>124</span>
            </span>
            <span class="board-count" data-board-count></span>
          </header>
          <div class="board-list" data-board-list></div>
          <p class="board-empty muted center" data-board-empty hidden data-i18n="dashboard.empty">No vehicles.</p>
        </section>
        <div class="boards-divider" aria-hidden="true">
          <span class="boards-divider-label" data-i18n="dashboard.categoriesLabel">Categories</span>
        </div>
        <section class="board" data-category="delivery">
          <header class="board-header">
            <span class="board-title delivery">
              <span class="board-icon">🚗</span>
              <span data-i18n="category.delivery">Delivery</span>
            </span>
            <span class="board-count" data-board-count></span>
          </header>
          <div class="board-list" data-board-list></div>
          <p class="board-empty muted center" data-board-empty hidden data-i18n="dashboard.empty">No vehicles.</p>
        </section>
        <section class="board" data-category="trade_auction">
          <header class="board-header">
            <span class="board-title trade_auction">
              <span class="board-icon">🏷️</span>
              <span data-i18n="category.trade_auction">Trade Auction</span>
            </span>
            <span class="board-count" data-board-count></span>
          </header>
          <div class="board-list" data-board-list></div>
          <p class="board-empty muted center" data-board-empty hidden data-i18n="dashboard.empty">No vehicles.</p>
        </section>
        <section class="board" data-category="service">
          <header class="board-header">
            <span class="board-title service">
              <span class="board-icon">🔧</span>
              <span data-i18n="category.service">Service</span>
            </span>
            <span class="board-count" data-board-count></span>
          </header>
          <div class="board-list" data-board-list></div>
          <p class="board-empty muted center" data-board-empty hidden data-i18n="dashboard.empty">No vehicles.</p>
        </section>
        <section class="board" data-category="wholesale_clean">
          <header class="board-header">
            <span class="board-title wholesale_clean">
              <span class="board-icon">💧</span>
              <span data-i18n="category.wholesale_clean">Wholesale Clean</span>
            </span>
            <span class="board-count" data-board-count></span>
          </header>
          <div class="board-list" data-board-list></div>
          <p class="board-empty muted center" data-board-empty hidden data-i18n="dashboard.empty">No vehicles.</p>
        </section>
      </div>
    </section>
  </template>

  <template id="tpl-add-car">
    <section class="card">
      <button class="back" data-back>&larr; <span data-i18n="common.back">Back</span></button>
      <h2 data-i18n="addCar.title">New vehicle</h2>
      <form id="add-car-form">
        <label>
          <span data-i18n="addCar.stock">Stock number</span>
          <input id="stock-number" type="text" required autocapitalize="characters" autocomplete="off" inputmode="text" enterkeyhint="next" />
        </label>
        <label>
          <span data-i18n="addCar.scheduled">Scheduled date and time</span>
          <input id="scheduled-at" type="datetime-local" required />
        </label>
        <fieldset class="cat-picker">
          <legend data-i18n="addCar.category">Category</legend>
          <label class="cat-card">
            <input type="radio" name="category" value="delivery" required />
            <span class="cat-tile delivery">
              <span class="cat-icon">🚗</span>
              <span class="cat-label" data-i18n="category.delivery">Delivery</span>
            </span>
          </label>
          <label class="cat-card">
            <input type="radio" name="category" value="trade_auction" />
            <span class="cat-tile trade_auction">
              <span class="cat-icon">🏷️</span>
              <span class="cat-label" data-i18n="category.trade_auction">Trade Auction</span>
            </span>
          </label>
          <label class="cat-card">
            <input type="radio" name="category" value="service" />
            <span class="cat-tile service">
              <span class="cat-icon">🔧</span>
              <span class="cat-label" data-i18n="category.service">Service</span>
            </span>
          </label>
          <label class="cat-card">
            <input type="radio" name="category" value="wholesale_clean" />
            <span class="cat-tile wholesale_clean">
              <span class="cat-icon">💧</span>
              <span class="cat-label" data-i18n="category.wholesale_clean">Wholesale Clean</span>
            </span>
          </label>
        </fieldset>
        <fieldset class="cat-picker">
          <legend data-i18n="addCar.lane">Bay</legend>
          <label class="cat-card">
            <input type="radio" name="lane" value="120" required />
            <span class="cat-tile">
              <span class="cat-icon">🚿</span>
              <span class="cat-label">120</span>
            </span>
          </label>
          <label class="cat-card">
            <input type="radio" name="lane" value="124" />
            <span class="cat-tile">
              <span class="cat-icon">🚿</span>
              <span class="cat-label">124</span>
            </span>
          </label>
        </fieldset>
        <button type="submit" class="primary block big" data-i18n="addCar.submit">Create</button>
        <p id="add-car-error" class="error" hidden></p>
      </form>
    </section>
  </template>

  <template id="tpl-car-detail">
    <section class="detail">
      <button class="back" data-back>&larr; <span data-i18n="common.back">Back</span></button>
      <div class="car-header">
        <div class="car-header-main">
          <div class="stock-big" id="car-stock"></div>
          <div class="meta">
            <span class="badge" id="car-category"></span>
            <span class="status-pill" id="car-status"></span>
          </div>
          <dl class="timestamps" id="car-timestamps"></dl>
        </div>
        <button id="delete-car" class="icon-btn danger role-gated" data-roles="manager" hidden aria-label="Delete" title="Delete">🗑</button>
      </div>

      <div id="urgent-strip" class="urgent-strip" hidden>
        <span class="urgent-bolt" aria-hidden="true">🚨</span>
        <span class="urgent-strip-text" data-i18n="detail.urgentActive">This job is flagged URGENT.</span>
        <span id="urgent-meta" class="muted"></span>
      </div>

      <div class="lane-controls role-gated" data-roles="manager" hidden>
        <span class="lane-label" data-i18n="detail.lane">Bay</span>
        <div class="lane-seg" id="lane-seg">
          <button type="button" data-lane="120">120</button>
          <button type="button" data-lane="124">124</button>
        </div>
      </div>

      <div class="urgent-controls role-gated" data-roles="manager,sales,service_advisor" hidden>
        <button id="urgent-toggle" class="urgent-btn" type="button">
          <span class="urgent-bolt" aria-hidden="true">🚨</span>
          <span id="urgent-toggle-label" data-i18n="detail.markUrgent">Mark as urgent</span>
        </button>
      </div>

      <div id="photos" class="photos"></div>
      <p id="no-photos" class="muted center" hidden data-i18n="detail.noPhotos">No photos yet.</p>

      <div class="role-gated" data-roles="manager,sales,service_advisor" id="upload-zone" hidden>
        <label class="upload">
          <input id="photo-input" type="file" accept="image/*" capture="environment" />
          <span class="upload-cta">
            <span class="cam" aria-hidden="true">📷</span>
            <span data-i18n="detail.addPhoto">Add attention zone photo</span>
          </span>
        </label>
        <div id="upload-preview" hidden>
          <img id="preview-img" alt="" />
          <textarea id="photo-note" rows="3" data-i18n-placeholder="detail.notePlaceholder" placeholder="Describe what to clean / pay attention to..."></textarea>
          <div class="row">
            <button id="cancel-upload" class="ghost" data-i18n="common.cancel">Cancel</button>
            <button id="confirm-upload" class="primary" data-i18n="detail.upload">Upload</button>
          </div>
          <div id="upload-progress" class="progress" hidden>
            <div class="progress-bar"></div>
          </div>
          <p id="upload-error" class="error" hidden></p>
        </div>
      </div>
    </section>
    <div class="sticky-action" id="sticky-action" hidden>
      <button id="complete-btn" class="primary block big role-gated" data-roles="manager,recon" hidden data-i18n="detail.markDone">Mark cleaning as done</button>
      <button id="reopen-btn" class="ghost block role-gated" data-roles="manager" hidden data-i18n="detail.reopen">Reopen</button>
    </div>
  </template>

  <template id="tpl-users">
    <section>
      <button class="back" data-back>&larr; <span data-i18n="common.back">Back</span></button>
      <div class="users-header">
        <h2 data-i18n="users.title">Users</h2>
        <span class="muted" id="users-count"></span>
      </div>
      <div id="users-list" class="users-list"></div>
      <p id="users-empty" class="muted center" hidden data-i18n="users.empty">No users.</p>
      <p id="users-error" class="error" hidden></p>
    </section>
  </template>

  <template id="tpl-edit-user">
    <section class="card">
      <button class="back" data-back>&larr; <span data-i18n="common.back">Back</span></button>
      <h2 data-i18n="users.editTitle">Edit user</h2>
      <form id="edit-user-form">
        <label>
          <span data-i18n="auth.name">Name</span>
          <input type="text" id="edit-name" autocomplete="name" required />
        </label>
        <label>
          <span data-i18n="auth.email">Email</span>
          <input type="email" id="edit-email" autocomplete="email" inputmode="email" required />
        </label>
        <label>
          <span data-i18n="auth.phone">Phone number</span>
          <input type="tel" id="edit-phone" autocomplete="tel" inputmode="tel" />
        </label>
        <fieldset class="cat-picker">
          <legend data-i18n="auth.role">Role</legend>
          <label class="cat-card">
            <input type="radio" name="edit-role" value="manager" />
            <span class="cat-tile"><span class="cat-icon">👔</span><span class="cat-label" data-i18n="role.manager">Manager</span></span>
          </label>
          <label class="cat-card">
            <input type="radio" name="edit-role" value="sales" />
            <span class="cat-tile"><span class="cat-icon">🤝</span><span class="cat-label" data-i18n="role.sales">Sales</span></span>
          </label>
          <label class="cat-card">
            <input type="radio" name="edit-role" value="service_advisor" />
            <span class="cat-tile"><span class="cat-icon">🛠️</span><span class="cat-label" data-i18n="role.service_advisor">Service Advisor</span></span>
          </label>
          <label class="cat-card">
            <input type="radio" name="edit-role" value="recon" />
            <span class="cat-tile"><span class="cat-icon">🧽</span><span class="cat-label" data-i18n="role.recon">Recon</span></span>
          </label>
        </fieldset>
        <label>
          <span data-i18n="users.newPassword">New password (optional)</span>
          <input type="password" id="edit-password" autocomplete="new-password" minlength="6" placeholder="" />
          <small class="muted" data-i18n="users.passwordHint">Leave blank to keep the existing password.</small>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="edit-sms-alerts" />
          <span>
            <strong data-i18n="users.smsAlerts">Receive SMS alerts</strong>
            <small class="muted" data-i18n="users.smsAlertsHint">Sends a text when a job is flagged urgent or marked done.</small>
          </span>
        </label>
        <div class="sms-test-row">
          <button type="button" id="sms-test-btn" class="ghost" data-i18n="users.smsTest">📱 Send test SMS to this user</button>
          <p id="sms-test-msg" class="muted" hidden></p>
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="edit-whatsapp-alerts" />
          <span>
            <strong data-i18n="users.whatsappAlerts">Receive WhatsApp alerts</strong>
            <small class="muted" data-i18n="users.whatsappAlertsHint">Same urgent / done triggers as SMS, delivered through WhatsApp. The user must first join the Twilio sandbox (one-time setup).</small>
          </span>
        </label>
        <div class="sms-test-row">
          <button type="button" id="whatsapp-test-btn" class="ghost" data-i18n="users.whatsappTest">💬 Send test WhatsApp to this user</button>
          <p id="whatsapp-test-msg" class="muted" hidden></p>
        </div>
        <button type="submit" class="primary block big" data-i18n="users.save">Save</button>
        <p id="edit-user-error" class="error" hidden></p>
      </form>
    </section>
  </template>

  <div id="dialog" class="dialog" hidden role="dialog" aria-modal="true">
    <div class="dialog-backdrop" data-dialog-close></div>
    <div class="dialog-card">
      <p id="dialog-message" class="dialog-message"></p>
      <div class="dialog-actions">
        <button id="dialog-cancel" type="button" class="ghost big"></button>
        <button id="dialog-ok" type="button" class="primary big"></button>
      </div>
    </div>
  </div>

  <div id="lightbox" class="lightbox" hidden>
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">✕</button>
    <div id="lightbox-stage" class="lightbox-stage">
      <img id="lightbox-img" alt="" />
    </div>
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>

  <script src="/i18n.js"></script>
  <script src="/vendor/sortable.min.js" defer></script>
  <script src="/app.js" defer></script>
</body>
</html>
